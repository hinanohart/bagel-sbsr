name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install --upgrade pip uv
      - name: Install ruff
        run: uv pip install --system "ruff>=0.7"
      - name: Run ruff check
        run: ruff check src tests scripts

  smoke:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install --upgrade pip uv
      - name: Install package (CPU torch, smoke deps only)
        run: |
          uv pip install --system --index-strategy unsafe-best-match \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            "torch>=2.5,<2.9" "torchvision>=0.20"
          uv pip install --system -e ".[dev]"
      - name: Run smoke tests
        run: pytest -m smoke -q
